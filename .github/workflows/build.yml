name: build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest        # linux/amd64
            arch: amd64
          - os: ubuntu-24.04-arm     # linux/arm64 (GitHub hosted)
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: |
          ./reproducible-builds/build.sh
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signal-cli-archive-${{ matrix.os }}
          path: dist/*

  build-client:
    strategy:
      matrix:
        os:
          - ubuntu
          - macos
          - windows
    runs-on: ${{ matrix.os }}-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v6
      - name: Install rust
        run: rustup default stable
      - name: Build client
        run: cargo build --release --verbose
      - name: Archive production artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signal-cli-client-${{ matrix.os }}
          path: |
            client/target/release/signal-cli-client
            client/target/release/signal-cli-client.exe
