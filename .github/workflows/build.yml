name: build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

permissions: {}

jobs:
  build:
    strategy:
      matrix:
        # The "reproducible" entry is used to build the project with the LTS Java version used in reproducible builds script.
        # More Java versions can be added to test compatibility, eg. "26".
        java: ["reproducible", "26"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: |
          if [ "${{ matrix.java }}" != "reproducible" ]; then
            export OVERRIDE_JAVA_VERSION="${{ matrix.java }}"
          fi
          ./reproducible-builds/build.sh
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signal-cli-${{ matrix.java }}-${{ github.job }}
          path: dist/*

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            native_task: nativeCompileLinuxAmd64
            artifact_dir: Linux-amd64
            binary_name: signal-cli
          - os: ubuntu-latest
            arch: arm64
            native_task: nativeCompileLinuxArm64
            artifact_dir: Linux-arm64
            binary_name: signal-cli
          - os: macos-14
            arch: arm64
            native_task: nativeCompileMacosArm64
            artifact_dir: macOS-arm64
            binary_name: signal-cli
          - os: macos-13
            arch: amd64
            native_task: nativeCompileMacosAmd64
            artifact_dir: macOS-amd64
            binary_name: signal-cli
          - os: windows-latest
            arch: amd64
            native_task: nativeCompileWindowsAmd64
            artifact_dir: Windows-amd64
            binary_name: signal-cli.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Download and install GraalVM
        shell: bash
        run: |
          GRAALVM_VERSION="25.0.2"
          case "${{ matrix.os }}" in
            ubuntu-latest)
              ARCH="x64"
              OS="linux"
              EXT="tar.gz"
              ;;
            macos-14)
              ARCH="aarch64"
              OS="macos"
              EXT="tar.gz"
              ;;
            macos-13)
              ARCH="x64"
              OS="macos"
              EXT="tar.gz"
              ;;
            windows-latest)
              ARCH="x64"
              OS="windows"
              EXT="zip"
              ;;
          esac
          FILENAME="graalvm-community-jdk-${GRAALVM_VERSION}_${OS}-${ARCH}_bin"
          curl -fsSL "https://github.com/graalvm/graalvm-ce-builds/releases/download/jdk-${GRAALVM_VERSION}/${FILENAME}.${EXT}" -o "./${FILENAME}.${EXT}"
          mkdir -p graalvm
          if [[ "$EXT" == "zip" ]]; then
            unzip -q "./${FILENAME}.${EXT}" -d graalvm/
          else
            tar -xzf "./${FILENAME}.${EXT}" -C graalvm/
          fi
          GRAALVM_HOME=$(find graalvm -maxdepth 1 -type d -name 'graalvm-community-*' | head -1)
          echo "GRAALVM_HOME=$GRAALVM_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$GRAALVM_HOME" >> $GITHUB_ENV
          echo "PATH=$GRAALVM_HOME/bin:$PATH" >> $GITHUB_ENV
      - name: Build native image
        run: |
          export GRAALVM_HOME="${{ env.GRAALVM_HOME }}"
          export JAVA_HOME="$GRAALVM_HOME"
          export PATH="$GRAALVM_HOME/bin:$PATH"
          ./gradlew ${{ matrix.native_task }} \
            --no-daemon \
            --max-workers=1 \
            -Dkotlin.compiler.execution.strategy=in-process \
            --no-build-cache \
            -Dorg.gradle.caching=false \
            -Dgraalvm.native-image.build-time=2026-01-01T00:00:00Z \
            --stacktrace 2>&1
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRAALVM_HOME: ${{ env.GRAALVM_HOME }}
      - name: Package native binary
        shell: bash
        run: |
          mkdir -p dist
          echo "Packaging for ${{ matrix.os }} (${{ matrix.artifact_dir }})"
          ls -la build/native/nativeCompile/ 2>&1 || echo "nativeCompile dir not found"
          if [[ "${{ matrix.os }}" == windows* ]]; then
            strip --strip-all \
              --remove-section=.note.gnu.build-id \
              --remove-section=.comment \
              --remove-section=.gnu_debuglink \
              --remove-section=.annobin.notes \
              --remove-section=.gnu.build.attributes \
              --remove-section=.note.ABI-tag \
              build/native/nativeCompile/signal-cli.exe
            chmod +x build/native/nativeCompile/signal-cli.exe
            SOURCE_DATE_EPOCH=1767225600 \
              tar --sort=name --mtime="@$SOURCE_DATE_EPOCH" --owner=0 --group=0 --numeric-owner \
              -cf "dist/signal-cli-${{ matrix.artifact_dir }}-native.tar" \
              -C build/native/nativeCompile signal-cli.exe
          else
            strip --strip-all \
              --remove-section=.note.gnu.build-id \
              --remove-section=.comment \
              --remove-section=.gnu_debuglink \
              --remove-section=.annobin.notes \
              --remove-section=.gnu.build.attributes \
              --remove-section=.note.ABI-tag \
              build/native/nativeCompile/signal-cli
            chmod +x build/native/nativeCompile/signal-cli
            SOURCE_DATE_EPOCH=1767225600 \
              tar --sort=name --mtime="@$SOURCE_DATE_EPOCH" --owner=0 --group=0 --numeric-owner \
              -cf "dist/signal-cli-${{ matrix.artifact_dir }}-native.tar" \
              -C build/native/nativeCompile signal-cli
          fi
          gzip -n -9 "dist/signal-cli-${{ matrix.artifact_dir }}-native.tar"
          ls -lsh dist/
      - name: Upload native artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signal-cli-${{ matrix.artifact_dir }}
          path: dist/*

  build-client:
    strategy:
      matrix:
        os:
          - ubuntu
          - macos
          - windows
    runs-on: ${{ matrix.os }}-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v6
      - name: Install rust
        run: rustup default stable
      - name: Build client
        run: cargo build --release --verbose
      - name: Archive production artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signal-cli-client-${{ matrix.os }}
          path: |
            client/target/release/signal-cli-client
            client/target/release/signal-cli-client.exe
