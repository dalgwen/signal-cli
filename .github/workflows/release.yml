name: release

on:
  push:
    tags:
      - v*

permissions: {}

env:
  IMAGE_NAME: signal-cli
  IMAGE_REGISTRY: ghcr.io/asamk
  REGISTRY_USER: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ github.token }}

jobs:
  build:
    uses: ./build.yml

  build-native:
    uses: ./build.yml
    with:
      build-native: true

  release:
    needs: [build, build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Download signal-cli build from CI workflow
        uses: actions/download-artifact@v8
        with:
          pattern: signal-cli-*
          merge-multiple: true

      - name: Get signal-cli version
        id: version
        run: |
          mv ./signal-cli-reproducible-build/* .
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Upload archive
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: v${{ steps.version.outputs.version }}
          draft: true

      - name: Upload all artifacts
        run: |
          for artifact in dist/*.tar.gz; do
            echo "Uploading $(basename "$artifact")"
            gh release upload v${{ steps.version.outputs.version }} "$artifact" \
              --clobber \
              -t "application/x-compressed-tar"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-container:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Download signal-cli build from CI workflow
        uses: actions/download-artifact@v8

      - name: Move archive file
        run: |
          tar xf ./signal-cli-reproducible-build/signal-cli-${{ needs.release.outputs.version }}.tar.gz
          mkdir -p build/install/
          mv ./signal-cli-"${{ needs.release.outputs.version }}"/ build/install/signal-cli

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest ${{ github.sha }} ${{ needs.release.outputs.version }}
          containerfiles: ./Containerfile
          oci: true

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          image: ${{ steps.build_image.outputs.image }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Echo outputs
        run: |
          echo "${{ toJSON(steps.push.outputs) }}"

  build-container-native:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Download native build
        uses: actions/download-artifact@v8
        with:
          path: ./native-build

      - name: Extract Linux-amd64 native
        run: |
          mkdir -p build/native/nativeCompile/
          tar xf ./native-build/signal-cli-Linux-amd64/signal-cli-Linux-amd64-native.tar.gz -C build/native/nativeCompile/
          chmod +x build/native/nativeCompile/signal-cli

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest-native ${{ github.sha }}-native ${{ needs.release.outputs.version }}-native
          containerfiles: ./native.Containerfile
          oci: true

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          image: ${{ steps.build_image.outputs.image }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Echo outputs
        run: |
          echo "${{ toJSON(steps.push.outputs) }}"

  build-container-client:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6
      - name: Download signal-cli build from CI workflow
        uses: actions/download-artifact@v8

      - name: Move archive file
        run: |
          tar xf ./signal-cli-reproducible-build/signal-cli-${{ needs.release.outputs.version }}-Linux-client.tar.gz
          mkdir -p client/target/release/
          mv signal-cli-client client/target/release/
          chmod +x client/target/release/signal-cli-client

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest-client ${{ github.sha }}-client ${{ needs.release.outputs.version }}-client
          containerfiles: ./client.Containerfile
          oci: true

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          image: ${{ steps.build_image.outputs.image }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Echo outputs
        run: |
          echo "${{ toJSON(steps.push.outputs) }}"
